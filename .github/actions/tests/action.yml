name: "Tests"
description: "Run Go tests for the MCP server"

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version: '1.26'
        cache: true

    - name: gofmt -d
      shell: bash
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "gofmt found unformatted files:"
          echo "$unformatted"
          gofmt -d .
          exit 1
        fi

    - name: go vet
      shell: bash
      run: go vet ./...

    - name: go test -race
      shell: bash
      run: go test -race -coverprofile=coverage.txt ./...

    - name: go build
      shell: bash
      run: go build -trimpath -ldflags "-s -w" -o /tmp/rubber-ducky-thinking .
