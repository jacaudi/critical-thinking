---
name: On Merge

on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'Dockerfile*'
      - 'plugins/**'
      - 'taskfile.yml'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Tests
        uses: ./.github/actions/tests
